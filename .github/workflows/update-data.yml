name: Update J-REIT data

# 既定/スケジュール = ランキング指標のみ（軽量・キー不要）。手動で full / edinet も選択可。
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "取得モード"
        type: choice
        default: "ranking"
        options: ["ranking", "full", "edinet", "full_then_edinet"]
  schedule:
    - cron: "0 22 * * 1"   # 毎週火 07:00 JST（月22:00 UTC）にランキング指標を自動更新

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Run data pipeline
        run: |
          mode="${{ inputs.mode }}"
          case "$mode" in
            full)             uv run python update_data.py --all ;;
            edinet)           uv run python update_data.py --all --edinet ;;
            full_then_edinet) uv run python update_data.py --all && uv run python update_data.py --all --edinet ;;
            *)                uv run python update_data.py --ranking ;;
          esac

      - name: Checkpoint WAL into DB
        run: |
          uv run python - <<'PY'
          import sqlite3
          con = sqlite3.connect("data/jreit.db")
          con.execute("PRAGMA wal_checkpoint(TRUNCATE)")
          con.close()
          PY

      - name: Commit & push updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jreit.db
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh J-REIT data via GitHub Actions"
            git push
          fi
